<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rolls — new roll</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #FAF6EE;
  font-family: 'SF Mono', 'Menlo', 'Roboto Mono', monospace;
  color: #1A1408;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(26,20,8,0.07) 1px, transparent 1px);
  background-size: 18px 18px;
  pointer-events: none;
  z-index: 0;
}

/* ---- Nav ---- */
.nav {
  background: #1A1408;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: 48px;
}

.nav-cancel {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(224,200,128,0.4);
  text-decoration: none;
  cursor: pointer;
  background: none;
  border: none;
  font-family: 'SF Mono', 'Menlo', 'Roboto Mono', monospace;
}

.nav-cancel:hover { color: rgba(224,200,128,0.7); }

.nav-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(224,200,128,0.9);
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

/* ---- Content ---- */
.content {
  max-width: 480px;
  margin: 0 auto;
  padding: 32px 16px 100px;
  position: relative;
  z-index: 1;
}

/* ---- Roll number header ---- */
.roll-number-hero {
  text-align: center;
  margin-bottom: 32px;
}

.roll-number-label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(26,20,8,0.3);
  margin-bottom: 6px;
}

.roll-number-value {
  font-size: 48px;
  font-weight: 700;
  color: rgba(26,20,8,0.08);
  letter-spacing: 4px;
  line-height: 1;
  margin-bottom: 6px;
}

.roll-number-edit {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(26,20,8,0.25);
  cursor: pointer;
  border: none;
  background: none;
  font-family: 'SF Mono', 'Menlo', 'Roboto Mono', monospace;
  padding: 4px 8px;
  border-radius: 3px;
}

.roll-number-edit:hover { color: rgba(26,20,8,0.5); background: rgba(26,20,8,0.04); }

/* ---- Form card ---- */
.form-card {
  background: #FAF6EE;
  border: 1px solid #D9D3CC;
  border-radius: 6px;
  box-shadow: 0 1px 3px rgba(60,40,20,0.06);
  overflow: hidden;
  margin-bottom: 10px;
}

.form-section-title {
  font-size: 7px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(26,20,8,0.3);
  padding: 12px 16px 0;
  margin-bottom: -2px;
}

.form-field {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(26,20,8,0.07);
}

.form-field:last-child { border-bottom: none; }

.field-lbl {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 7px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(26,20,8,0.35);
  margin-bottom: 6px;
}

.field-optional {
  font-size: 7px;
  font-weight: 400;
  letter-spacing: 1px;
  color: rgba(26,20,8,0.2);
}

.field-select {
  display: block;
  width: 100%;
  padding: 10px 32px 10px 12px;
  font-family: 'SF Mono', 'Menlo', 'Roboto Mono', monospace;
  font-size: 13px;
  background: rgba(26,20,8,0.03);
  border: 1px solid rgba(26,20,8,0.12);
  border-radius: 3px;
  color: #1A1408;
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='rgba(26,20,8,0.3)' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  outline: none;
  cursor: pointer;
}

.field-select:focus { border-color: #D4900A; }

.field-select option[value=""] { color: rgba(26,20,8,0.4); }

.field-input {
  display: block;
  width: 100%;
  padding: 10px 12px;
  font-family: 'SF Mono', 'Menlo', 'Roboto Mono', monospace;
  font-size: 13px;
  background: rgba(26,20,8,0.03);
  border: 1px solid rgba(26,20,8,0.12);
  border-radius: 3px;
  color: #1A1408;
  outline: none;
}

.field-input:focus { border-color: #D4900A; background: rgba(212,144,10,0.03); }
.field-input::placeholder { color: rgba(26,20,8,0.25); }

/* Camera hint */
.camera-hint {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-top: 8px;
  padding: 8px 10px;
  background: rgba(26,20,8,0.03);
  border-radius: 3px;
}

.camera-hint-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #5B9BD5;
  flex-shrink: 0;
  margin-top: 3px;
}

.camera-hint-text {
  font-size: 10px;
  color: rgba(26,20,8,0.35);
  line-height: 1.5;
}

/* ---- Submit ---- */
.submit-area {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.btn-submit {
  display: block;
  width: 100%;
  padding: 15px 20px;
  background: #D4900A;
  border: none;
  border-radius: 4px;
  font-family: 'SF Mono', 'Menlo', 'Roboto Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #19150E;
  cursor: pointer;
  text-align: center;
}

.btn-submit:hover { background: #C0820A; }

.cancel-link {
  display: block;
  text-align: center;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(26,20,8,0.3);
  text-decoration: none;
  padding: 8px;
  cursor: pointer;
}

.cancel-link:hover { color: rgba(26,20,8,0.6); }
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-cancel">Cancel</button>
  <span class="nav-title">New Roll</span>
  <div style="width:50px;"></div>
</nav>

<div class="content">

  <!-- Ghost roll number -->
  <div class="roll-number-hero">
    <div class="roll-number-label">Roll number</div>
    <div class="roll-number-value">26x05</div>
    <button class="roll-number-edit">↻ Regenerate</button>
  </div>

  <!-- Film & Camera -->
  <div class="form-card">
    <div class="form-section-title">Equipment</div>

    <div class="form-field">
      <label class="field-lbl">Film</label>
      <select class="field-select">
        <option value="" disabled selected>Select film stock…</option>
        <option>Kodak Gold 200</option>
        <option>Kodak Portra 400</option>
        <option>Ilford HP5 Plus 400</option>
        <option>Fujifilm Superia X-TRA 400</option>
        <option>Lomography Color 800</option>
      </select>
    </div>

    <div class="form-field">
      <label class="field-lbl">
        Camera
        <span class="field-optional">optional</span>
      </label>
      <select class="field-select">
        <option value="">No camera yet</option>
        <option>Contax T2</option>
        <option>Leica M6</option>
        <option>Olympus Stylus Epic</option>
        <option>Nikon FM2</option>
        <option>Canonet QL17 GIII</option>
      </select>
      <div class="camera-hint">
        <div class="camera-hint-dot"></div>
        <div class="camera-hint-text">
          Without a camera the roll is added to your fridge — track it until you load it.
        </div>
      </div>
    </div>
  </div>

  <!-- Details -->
  <div class="form-card">
    <div class="form-section-title">Details</div>

    <div class="form-field">
      <label class="field-lbl">
        Album name
        <span class="field-optional">optional</span>
      </label>
      <input type="text" class="field-input" placeholder="e.g. Summer 2026, Brittany trip…" />
    </div>
  </div>

  <!-- Submit -->
  <div class="submit-area">
    <button class="btn-submit">Start Roll</button>
    <a href="#" class="cancel-link">Cancel</a>
  </div>

</div>

</body>
</html>
