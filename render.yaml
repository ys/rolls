services:
  - type: web
    name: rolls
    runtime: node
    rootDir: web
    buildCommand: npm install && npm run build
    startCommand: npm start -- -p $PORT
    nodeVersion: 22
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: API_KEY
        sync: false
      - key: WEB_PASSWORD
        sync: false
      - key: NODE_ENV
        value: production
