<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f4f1ea" />
  <title>Rolls — Offline</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --text-primary: #1a1612;
      --text-secondary: #6b5a52;
      --text-tertiary: #9e8a82;
      --border: #d9d0c7;
      --accent: #8b5e3c;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1612;
        --text-primary: #f4f1ea;
        --text-secondary: #b8a89e;
        --text-tertiary: #7a6a62;
        --border: #2e2520;
        --accent: #c4906a;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 24px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      text-align: center;
    }
    h1 {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-primary);
    }
    p {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    button {
      margin-top: 8px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: none;
      border: 1.5px solid var(--accent);
      cursor: pointer;
      font-family: inherit;
    }
    button:active { opacity: 0.6; }
  </style>
</head>
<body>
  <h1>Rolls</h1>
  <p>You're offline.<br />Check your connection and try again.</p>
  <button onclick="location.reload()">Retry</button>
</body>
</html>
